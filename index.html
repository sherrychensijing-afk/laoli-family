<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>老郦家</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#E8913A">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="老郦家">
  <link rel="stylesheet" href="/css/style.css?v=2">
</head>
<body>

  <!-- ===== 主应用 ===== -->
  <div id="appMain">

  <!-- 顶部导航 -->
  <header class="header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-icon">&#127968;</span>
        <span class="logo-text">老郦家</span>
      </div>
      <nav class="nav-tabs" id="navTabs">
        <button class="nav-tab active" data-tab="dashboard">首页</button>
        <button class="nav-tab" data-tab="schedule">日程</button>
        <button class="nav-tab" data-tab="rules">家规</button>
        <button class="nav-tab" data-tab="messages">留言</button>
        <button class="nav-tab" data-tab="photos">相册</button>
      </nav>
    </div>
  </header>

  <!-- 主内容区 -->
  <main class="main-content">

    <!-- ============ Tab 1: 首页 ============ -->
    <section class="tab-content active" id="tab-dashboard">
      <!-- 欢迎横幅 -->
      <div class="welcome-banner">
        <div class="welcome-text">
          <h2 id="greetingText"></h2>
          <p id="todayDate"></p>
        </div>
      </div>

      <!-- 家庭成员 -->
      <div class="section">
        <h3 class="section-title">家庭成员</h3>
        <div class="member-cards" id="memberCards"></div>
      </div>

      <!-- 今日待办 -->
      <div class="section">
        <h3 class="section-title">今日待办</h3>
        <div class="todo-list" id="todayTodos"><div class="empty-state">加载中...</div></div>
      </div>

      <!-- 猫咪状态 -->
      <div class="section">
        <h3 class="section-title">猫咪状态</h3>
        <div class="cat-status-card" id="catStatus"><div class="empty-state">加载中...</div></div>
      </div>

      <!-- 家庭纪念日 -->
      <div class="section">
        <h3 class="section-title">纪念日</h3>
        <div class="anniversary-list" id="anniversaryList"><div class="empty-state">加载中...</div></div>
      </div>

      <!-- 邮件提醒设置 -->
      <div class="section">
        <h3 class="section-title" style="cursor:pointer" onclick="document.getElementById('emailSettings').classList.toggle('collapsed')">
          邮件提醒 <span style="font-size:12px;color:#999;font-weight:400;">（点击展开）</span>
        </h3>
        <div class="email-settings collapsed" id="emailSettings">
          <p style="font-size:13px;color:#999;margin-bottom:14px;">每日自动发送日程汇总到邮箱（需QQ邮箱授权码）</p>
          <div class="form-group">
            <label>启用提醒</label>
            <select id="emailEnabled" onchange="Dashboard.toggleEmailConfig()">
              <option value="false">关闭</option>
              <option value="true">开启</option>
            </select>
          </div>
          <div id="emailAuthFields">
            <div class="form-group">
              <label>发件邮箱(QQ)</label>
              <input type="text" id="emailUser" placeholder="your@qq.com">
            </div>
            <div class="form-group">
              <label>授权码</label>
              <input type="password" id="emailPass" placeholder="QQ邮箱SMTP授权码">
              <span style="font-size:11px;color:#999;">获取：QQ邮箱 → 设置 → 账户 → POP3/SMTP → 生成授权码</span>
            </div>
            <div class="form-group">
              <label>收件邮箱</label>
              <input type="text" id="emailRecipient" value="837806718@qq.com" placeholder="收件人">
            </div>
            <div style="display:flex;gap:10px;">
              <button class="btn btn-primary" onclick="Dashboard.saveEmailConfig()">保存配置</button>
              <button class="btn btn-outline" onclick="Dashboard.testEmail()">发送测试</button>
            </div>
          </div>
          <div id="emailStatus" style="margin-top:10px;font-size:13px;"></div>
        </div>
      </div>
    </section>

    <!-- ============ Tab 2: 日程提醒 ============ -->
    <section class="tab-content" id="tab-schedule">
      <div class="schedule-toolbar">
        <h2 class="page-title">日程提醒</h2>
        <button class="btn btn-primary btn-sm" onclick="Schedule.showAddModal()">+ 添加日程</button>
      </div>

      <div class="filter-chips" id="filterChips">
        <button class="chip active" data-filter="all">全部</button>
        <button class="chip" data-filter="travel">出行</button>
        <button class="chip" data-filter="pet">猫咪</button>
        <button class="chip" data-filter="intimacy">亲密</button>
        <button class="chip" data-filter="family">家庭</button>
        <button class="chip" data-filter="custom">自定义</button>
      </div>

      <div id="scheduleList">
        <div class="empty-state">加载中...</div>
      </div>

      <!-- 添加/编辑弹窗 -->
      <div class="modal" id="addScheduleModal">
        <div class="modal-header">
          <h4>添加新日程</h4>
          <button class="modal-close" onclick="Schedule.hideAddModal()">&times;</button>
        </div>
        <div class="modal-body">
          <div class="form-group"><label>标题 *</label><input type="text" id="newTitle" placeholder="日程标题"></div>
          <div class="form-row">
            <div class="form-group" style="flex:1"><label>日期 *</label><input type="date" id="newDate"></div>
            <div class="form-group" style="flex:1"><label>时段</label>
              <select id="newTime">
                <option value="morning">上午</option><option value="afternoon">下午</option>
                <option value="evening" selected>晚上</option><option value="bedtime">睡前</option>
              </select>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group" style="flex:1"><label>负责人</label><input type="text" id="newPerson" placeholder="可选"></div>
            <div class="form-group" style="flex:1"><label>分类</label>
              <select id="newCategory">
                <option value="custom">自定义</option>
                <option value="travel">出行</option>
                <option value="pet">猫咪</option>
                <option value="intimacy">亲密</option>
                <option value="family">家庭</option>
              </select>
            </div>
          </div>
          <div class="form-group"><label>备注</label><textarea id="newDesc" rows="2" placeholder="可选描述"></textarea></div>
          <div style="display:flex;gap:8px;">
            <button class="btn btn-primary" style="flex:1" onclick="Schedule.saveNewSchedule()">保存</button>
            <button class="btn btn-outline" style="flex:1" onclick="Schedule.hideAddModal()">取消</button>
          </div>
        </div>
      </div>
    </section>

    <!-- ============ Tab 3: 郦家家规 ============ -->
    <section class="tab-content" id="tab-rules">
      <div class="rules-header">
        <h2 class="rules-title">郦家家规</h2>
        <p class="rules-subtitle">基于客观道理与互相尊重的家庭准则</p>
      </div>

      <div class="rules-list" id="rulesList"><div class="empty-state">加载中...</div></div>

      <div class="rules-actions">
        <button class="btn btn-outline btn-sm" onclick="Rules.showAddForm()">+ 新增家规</button>
        <button class="btn btn-outline btn-sm" onclick="Rules.render()">刷新列表</button>
      </div>

      <div class="rule-form" id="ruleForm" style="display:none">
        <div class="form-group"><label>标题</label><input type="text" id="ruleTitle" placeholder="家规标题"></div>
        <div class="form-group"><label>内容</label><textarea id="ruleContent" rows="3" placeholder="具体规则内容"></textarea></div>
        <div style="display:flex;gap:8px;">
          <button class="btn btn-primary btn-sm" onclick="Rules.saveRule()">保存</button>
          <button class="btn btn-outline btn-sm" onclick="Rules.hideForm()">取消</button>
        </div>
      </div>
    </section>

    <!-- ============ Tab 4: 留言板 ============ -->
    <section class="tab-content" id="tab-messages">
      <div class="messages-header">
        <h2 class="messages-title">家庭留言板</h2>
        <p class="messages-subtitle">匿名发言，畅所欲言</p>
      </div>

      <div class="message-composer">
        <div class="composer-hint">匿名模式 · 身份不会显示</div>
        <textarea id="msgContent" rows="3" placeholder="想说点什么..."></textarea>
        <button class="btn btn-primary" id="btnPostMessage" onclick="Messages.postMessage()">发送</button>
      </div>

      <div class="messages-list" id="messagesList"><div class="empty-state">加载中...</div></div>
    </section>

    <!-- ============ Tab 5: 家庭相册 ============ -->
    <section class="tab-content" id="tab-photos">
      <div class="photos-header">
        <h2 class="photos-title">家庭相册</h2>
        <p class="photos-subtitle">记录每一个美好瞬间</p>
      </div>

      <div class="photo-uploader">
        <label class="upload-btn" for="photoInput">上传照片</label>
        <input type="file" id="photoInput" accept="image/*" multiple onchange="Photos.previewUpload(event)" style="display:none">
        <select id="photoTag" style="padding:8px 12px;border:1px solid #e0ddd9;border-radius:8px;font-size:13px;font-family:-apple-system,sans-serif;">
          <option value="family">家庭</option>
          <option value="cat">猫咪</option>
          <option value="member">成员</option>
        </select>
        <input type="text" id="photoCaption" placeholder="照片描述(可选)"
               style="flex:1;min-width:120px;padding:8px 12px;border:1px solid #e0ddd9;border-radius:8px;font-size:13px;font-family:-apple-system,sans-serif;">
        <div id="photoPreview" style="display:none;"></div>
        <button class="btn btn-primary" id="btnUploadPhoto" onclick="Photos.uploadPhotos()">保存</button>
      </div>

      <div class="photos-grid" id="photosGrid"><div class="empty-state">加载中...</div></div>

      <div class="lightbox-overlay" id="lightbox" onclick="Photos.closeLightbox()">
        <button class="lightbox-close">&times;</button>
        <img id="lightboxImg" src="" alt="">
        <div class="lightbox-info" id="lightboxInfo"></div>
      </div>
    </section>

  </main><!-- /main-content -->

  <!-- Toast 提示 -->
  <div class="toast" id="toast"></div>

  </div><!-- /appMain -->

  <!-- ========== JS 脚本（顺序重要！） ========== -->
  <script src="/js/api.js?v=2"></script>
  <script src="/js/dashboard.js?v=3"></script>
  <script src="/js/schedule.js?v=2"></script>
  <script src="/js/rules.js?v=2"></script>
  <script src="/js/messages.js?v=2"></script>
  <script src="/js/photos.js?v=2"></script>
  <script src="/js/app.js?v=3"></script>

  <!-- PWA Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(()=>{});
    }
  </script>
</body>
</html>
