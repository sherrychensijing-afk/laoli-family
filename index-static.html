<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover">
<title>老郦家</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#E8913A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="老郦家">
<style>
:root{--bg-primary:#F9F6F0;--bg-card:#FFFFFF;--text-primary:#3D3226;--text-secondary:#6B5E4E;--text-muted:#A89880;--border-color:#E8DFD0;--color-warm:#E8913A;--color-warm-bg:#FFF3E6;--color-warm-light:#F5C898;--color-pink:#E874A5;--color-pink-light:#FDE8F2;--color-blue:#7B9EBD;--color-blue-light:#E8F0F6;--color-green:#7CB97C;--color-red:#D94545;--shadow-sm:0 1px 3px rgba(0,0,0,.05);--shadow-md:0 4px 12px rgba(0,0,0,.08);--radius-sm:8px;--radius-md:14px;--font-sans:'-apple-system','PingFang SC','Microsoft YaHei',sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font-sans);background:var(--bg-primary);color:var(--text-primary);line-height:1.6;min-height:100vh;-webkit-tap-highlight-color:transparent}
.header{background:var(--bg-card);border-bottom:1px solid var(--border-color);position:sticky;top:0;z-index:100}
.header-inner{max-width:900px;margin:0 auto;padding:0 16px;display:flex;align-items:center;height:50px;gap:16px}
.logo{display:flex;align-items:center;gap:6px}
.logo-icon{font-size:20px}.logo-text{font-size:16px;font-weight:700;letter-spacing:2px}
.nav-tabs{display:flex;gap:2px;flex:1}
.nav-tab{padding:5px 12px;border:none;border-radius:7px;background:transparent;color:var(--text-secondary);font-size:13px;font-weight:500;cursor:pointer;font-family:var(--font-sans)}
.nav-tab:hover{background:var(--bg-primary)}.nav-tab.active{background:var(--color-warm);color:#FFF}
.header-address{font-size:11px;color:var(--text-muted)}
.main-content{max-width:900px;margin:0 auto;padding:16px}
.tab-content{display:none}.tab-content.active{display:block}
.welcome-banner{background:linear-gradient(135deg,#FDE8D0,#FFF3E6);border-radius:var(--radius-md);padding:16px 20px;margin-bottom:14px}
.welcome-text h2{font-size:18px;font-weight:700;margin-bottom:2px}
.welcome-text p{font-size:12px;color:var(--text-secondary)}
.section{margin-bottom:16px}
.section-title{font-size:14px;font-weight:600;margin-bottom:8px}
.member-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px}
.member-card{background:var(--bg-card);border-radius:var(--radius-sm);padding:12px 14px;box-shadow:var(--shadow-sm);display:flex;align-items:center;gap:10px;border:1px solid var(--border-color)}
.member-avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;color:#FFF;flex-shrink:0}
.member-info h4{font-size:13px;font-weight:600}.member-info .meta{font-size:11px;color:var(--text-muted)}
.member-role{display:inline-block;font-size:10px;padding:1px 6px;border-radius:7px;font-weight:500;margin-top:2px}
.role-家主{background:var(--color-warm-bg);color:var(--color-warm)}
.role-副家主{background:var(--color-pink-light);color:var(--color-pink)}
.role-成员{background:var(--color-blue-light);color:var(--color-blue)}
.todo-item{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--bg-card);border-radius:var(--radius-sm);box-shadow:var(--shadow-sm);margin-bottom:6px;border:1px solid var(--border-color)}
.todo-item.done{opacity:.5}
.todo-check{width:22px;height:22px;border-radius:50%;border:2px solid var(--border-color);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--color-green);flex-shrink:0}
.todo-check.checked{background:var(--color-green);border-color:var(--color-green);color:#FFF}
.todo-category{font-size:16px;flex-shrink:0;width:24px;text-align:center}
.todo-info{flex:1;min-width:0}.todo-info .title{font-size:13px;font-weight:500}.todo-info .desc{font-size:11px;color:var(--text-muted)}
.todo-time{font-size:11px;color:var(--text-muted);padding:2px 8px;background:var(--bg-primary);border-radius:8px;flex-shrink:0}
.cat-status-card{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.cat-stat-item{display:flex;align-items:center;gap:10px;background:var(--bg-card);border-radius:var(--radius-sm);padding:12px 14px;box-shadow:var(--shadow-sm);border:1px solid var(--border-color)}
.cat-stat-icon{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.cat-stat-icon.normal{background:var(--color-blue-light)}
.cat-stat-icon.urgent{background:#FDE8D0;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.cat-stat-info h4{font-size:12px;font-weight:600}.cat-stat-info p{font-size:11px;color:var(--text-muted)}
.anniversary-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
.anniversary-card{background:var(--bg-card);border-radius:var(--radius-sm);padding:12px 14px;box-shadow:var(--shadow-sm);border:1px solid var(--border-color);display:flex;align-items:center;gap:10px}
.anniversary-card.today{border-color:var(--color-warm);background:linear-gradient(135deg,#FFF3E6,#FDE8D0)}
.anniversary-avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;color:#FFF;flex-shrink:0}
.anniversary-info h4{font-size:12px;font-weight:600}.anniversary-info .date-label{font-size:11px;color:var(--text-muted)}
.anniversary-countdown{font-size:11px;font-weight:600;margin-left:auto;padding:3px 10px;border-radius:10px;white-space:nowrap}
.countdown-today{background:var(--color-warm);color:#FFF}
.countdown-week{background:var(--color-warm-bg);color:var(--color-warm)}
.countdown-month{background:var(--bg-primary);color:var(--text-muted)}
.schedule-toolbar{display:flex;gap:10px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
.filter-chips{display:flex;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;flex-wrap:nowrap;padding-bottom:4px}
.chip{padding:5px 14px;border-radius:14px;border:1px solid var(--border-color);background:var(--bg-card);font-size:12px;cursor:pointer;white-space:nowrap;font-family:var(--font-sans);transition:all .15s}
.chip.active{background:var(--color-warm);color:#FFF;border-color:var(--color-warm)}
.schedule-group{margin-bottom:12px}
.schedule-date-header{font-size:12px;color:var(--text-muted);margin-bottom:6px;padding-left:2px}
.schedule-item{display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--bg-card);border-radius:var(--radius-sm);box-shadow:var(--shadow-sm);margin-bottom:4px;border:1px solid var(--border-color);flex-wrap:wrap}
.schedule-item.completed{opacity:.5}
.schedule-item .item-icon{font-size:14px;flex-shrink:0;width:20px;text-align:center}
.schedule-item .item-info{flex:1;min-width:80px}
.schedule-item .item-title{font-size:12px;font-weight:500}.schedule-item .item-desc{font-size:11px;color:var(--text-muted)}
.item-badge{font-size:10px;padding:2px 8px;border-radius:8px;flex-shrink:0}
.badge-travel{background:#E8F0F6;color:#5A86AD}.badge-pet{background:#E8F5E8;color:#6BA86B}
.badge-intimacy{background:#FDE8F2;color:#D4729A}.badge-family{background:#FFF0DB;color:#D4892A}
.badge-custom{background:#EDE0D4;color:#8B7355}
.item-actions{display:flex;gap:4px;flex-shrink:0}
.completed-section{margin-top:16px;border-top:2px dashed var(--border-color);padding-top:12px}
.completed-toggle{display:flex;justify-content:space-between;align-items:center;padding:8px 14px;background:var(--bg-card);border-radius:var(--radius-sm);border:1px solid var(--border-color);cursor:pointer;font-size:13px;color:var(--text-secondary);font-weight:500}
.toggle-arrow{transition:transform .2s;font-size:11px}
.completed-toggle.open .toggle-arrow{transform:rotate(180deg)}
.completed-list{display:none;margin-top:6px}.completed-list.show{display:flex;flex-direction:column;gap:4px}
.rules-title{font-size:24px;font-weight:700;text-align:center;margin-bottom:4px}
.rules-subtitle{font-size:13px;color:var(--text-muted);text-align:center;margin-bottom:16px}
.rules-actions{display:flex;gap:8px;margin-bottom:14px}
.rule-card{background:var(--bg-card);border-radius:var(--radius-sm);padding:14px 16px;box-shadow:var(--shadow-sm);margin-bottom:8px;border:1px solid var(--border-color)}
.rule-card-header{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.rule-number{width:24px;height:24px;border-radius:50%;background:var(--color-warm);color:#FFF;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.rule-card-header h4{font-size:13px;font-weight:600}
.rule-content{font-size:13px;color:var(--text-secondary);padding-left:34px;line-height:1.7}
.rule-actions-row{display:flex;gap:6px;margin-top:8px;padding-left:34px}
.messages-header{text-align:center;margin-bottom:16px}
.messages-title{font-size:22px;font-weight:700}.messages-subtitle{font-size:12px;color:var(--text-muted);margin-top:4px}
.message-composer{background:var(--bg-card);border-radius:var(--radius-sm);padding:14px 16px;box-shadow:var(--shadow-sm);border:1px solid var(--border-color);margin-bottom:14px}
.composer-hint{font-size:11px;color:var(--text-muted);margin-bottom:8px}
.message-composer textarea{width:100%;padding:10px 12px;border:1px solid var(--border-color);border-radius:var(--radius-sm);font-size:13px;font-family:var(--font-sans);resize:vertical;margin-bottom:8px}
.message-composer textarea:focus{outline:none;border-color:var(--color-warm)}
.messages-list{display:flex;flex-direction:column;gap:10px}
.message-card{background:var(--bg-card);border-radius:var(--radius-sm);padding:14px 16px;box-shadow:var(--shadow-sm);border:1px solid var(--border-color)}
.message-meta{font-size:11px;color:var(--text-muted);margin-bottom:6px}
.message-content{font-size:14px;line-height:1.7;margin-bottom:10px;white-space:pre-wrap}
.message-replies{background:var(--bg-primary);border-radius:var(--radius-sm);padding:10px 12px;margin-bottom:10px}
.reply-item{padding:6px 0;border-bottom:1px solid var(--border-color)}
.reply-item:last-child{border-bottom:none}.reply-meta{font-size:10px;color:var(--text-muted)}.reply-content{font-size:12px;color:var(--text-secondary);white-space:pre-wrap}
.reply-input-row{display:flex;gap:6px}
.reply-input-row input{flex:1;padding:6px 10px;border:1px solid var(--border-color);border-radius:var(--radius-sm);font-size:12px;font-family:var(--font-sans)}
.reply-input-row input:focus{outline:none;border-color:var(--color-warm)}
.photos-header{text-align:center;margin-bottom:14px}
.photos-title{font-size:22px;font-weight:700}.photos-subtitle{font-size:12px;color:var(--text-muted)}
.photo-uploader{background:var(--bg-card);border-radius:var(--radius-sm);padding:12px 14px;box-shadow:var(--shadow-sm);border:1px solid var(--border-color);margin-bottom:14px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.upload-btn{background:var(--color-warm);color:#FFF;padding:6px 14px;border-radius:7px;font-size:13px;cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:4px}
.upload-btn:hover{background:#D47A2A}
.photos-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px}
.photo-card{background:var(--bg-card);border-radius:var(--radius-sm);overflow:hidden;box-shadow:var(--shadow-sm);border:1px solid var(--border-color);position:relative}
.photo-card img{width:100%;aspect-ratio:1;object-fit:cover;cursor:pointer;display:block}
.photo-card-footer{padding:8px 10px}
.photo-tag{font-size:10px;padding:1px 6px;border-radius:6px;background:var(--bg-primary);color:var(--text-secondary)}.photo-date{font-size:10px;color:var(--text-muted);margin-left:6px}.photo-caption{font-size:11px;color:var(--text-secondary);margin-top:3px}
.photo-delete{position:absolute;top:6px;right:6px;width:22px;height:22px;border-radius:50%;background:rgba(0,0,0,.4);color:#FFF;border:none;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s}
.photo-card:hover .photo-delete{opacity:1}
.lightbox-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.9);z-index:300;align-items:center;justify-content:center;flex-direction:column}
.lightbox-overlay.show{display:flex}.lightbox-overlay img{max-width:90vw;max-height:80vh;border-radius:8px;object-fit:contain}.lightbox-close{position:absolute;top:16px;right:20px;width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.2);color:#FFF;border:none;font-size:24px;cursor:pointer}.lightbox-info{color:rgba(255,255,255,.7);font-size:13px;margin-top:12px}
.empty-state{text-align:center;padding:30px;color:var(--text-muted);font-size:13px}
.btn{padding:8px 16px;border:none;border-radius:8px;font-size:13px;cursor:pointer;font-family:var(--font-sans);transition:all .15s}
.btn-primary{background:var(--color-warm);color:#FFF}.btn-primary:hover{background:#D47A2A}
.btn-outline{border:1px solid var(--border-color);background:var(--bg-card);color:var(--text-secondary)}.btn-outline:hover{border-color:var(--color-warm)}
.btn-danger{background:transparent;color:var(--color-red);border:none}.btn-danger:hover{background:#FDEDED}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:rgba(50,40,30,.9);color:#FFF;padding:8px 20px;border-radius:20px;font-size:13px;opacity:0;transition:opacity .3s;z-index:500;pointer-events:none}.toast.show{opacity:1}
@media(max-width:768px){.header-address{display:none}.member-cards{grid-template-columns:repeat(2,1fr)}.cat-status-card{grid-template-columns:1fr}.photos-grid{grid-template-columns:repeat(2,1fr)}.anniversary-list{grid-template-columns:1fr}.rules-actions{flex-direction:column}.rules-actions .btn{width:100%}}
@media(max-width:480px){.member-cards{grid-template-columns:1fr}.nav-tab{font-size:11px;padding:4px 8px}}
</style>
</head>
<body>
<div id="appMain">

<header class="header"><div class="header-inner">
<div class="logo"><span class="logo-icon">🏠</span><span class="logo-text">老郦家</span></div>
<nav class="nav-tabs" id="navTabs">
<button class="nav-tab active" data-tab="dashboard">首页</button>
<button class="nav-tab" data-tab="schedule">日程</button>
<button class="nav-tab" data-tab="rules">家规</button>
<button class="nav-tab" data-tab="messages">留言</button>
<button class="nav-tab" data-tab="photos">相册</button>
</nav>
<span class="header-address">誉天下123-3-302</span>
</div></header>

<main class="main-content">

<!-- Dashboard -->
<section class="tab-content active" id="tab-dashboard">
<div class="welcome-banner"><div class="welcome-text"><h2 id="greetingText">晚上好，老郦家</h2><p id="todayDate"></p></div></div>
<div class="section"><h3 class="section-title">家庭成员</h3><div class="member-cards" id="memberCards"><div class="empty-state">加载中...</div></div></div>
<div class="section"><h3 class="section-title">今日待办</h3><div class="todo-list" id="todayTodos"><div class="empty-state">加载中...</div></div></div>
<div class="section"><h3 class="section-title">猫咪状态</h3><div class="cat-status-card" id="catStatus"><div class="empty-state">加载中...</div></div></div>
<div class="section"><h3 class="section-title">纪念日</h3><div class="anniversary-list" id="anniversaryList"><div class="empty-state">加载中...</div></div></div>
</section>

<!-- Schedule -->
<section class="tab-content" id="tab-schedule">
<div class="schedule-toolbar">
<div class="filter-chips" id="filterChips">
<button class="chip active" data-filter="all">全部</button>
<button class="chip" data-filter="travel">出行</button>
<button class="chip" data-filter="pet">猫咪</button>
<button class="chip" data-filter="intimacy">亲密</button>
<button class="chip" data-filter="family">家庭</button>
<button class="chip" data-filter="custom">自定义</button>
</div>
<button class="btn btn-primary" onclick="Schedules.showAdd()">+ 添加</button>
</div>
<div id="scheduleList"><div class="empty-state">加载中...</div></div>
</section>

<!-- Rules -->
<section class="tab-content" id="tab-rules">
<div class="rules-title">郦家家规</div>
<div class="rules-subtitle">一切讲客观道理，互相尊重</div>
<div class="rules-actions"><button class="btn btn-primary" onclick="Rules.showAdd()">+ 新增条规</button></div>
<div id="rulesList"><div class="empty-state">加载中...</div></div>
</section>

<!-- Messages -->
<section class="tab-content" id="tab-messages">
<div class="messages-header"><h2 class="messages-title">家庭留言板</h2><p class="messages-subtitle">匿名发言，畅所欲言</p></div>
<div class="message-composer">
<div class="composer-hint">匿名模式</div>
<textarea id="msgContent" rows="2" placeholder="想说点什么..."></textarea>
<button class="btn btn-primary" onclick="Messages.post()">匿名发送</button></div>
<div class="messages-list" id="messagesList"><div class="empty-state">加载中...</div></div>
</section>

<!-- Photos -->
<section class="tab-content" id="tab-photos">
<div class="photos-header"><h2 class="photos-title">家庭相册</h2><p class="photos-subtitle">记录每一个美好瞬间</p></div>
<div class="photo-uploader">
<label class="upload-btn" for="photoInput">上传照片</label>
<input type="file" id="photoInput" accept="image/*" multiple onchange="Photos.handleFiles(this)" style="display:none">
<select id="photoTag" style="padding:6px 10px;border:1px solid var(--border-color);border-radius:7px;font-size:12px;font-family:var(--font-sans)"><option value="family">家庭</option><option value="cat">猫咪</option><option value="member">成员</option></select>
<input type="text" id="photoCaption" placeholder="描述" style="padding:6px 10px;border:1px solid var(--border-color);border-radius:7px;font-size:12px;font-family:var(--font-sans);width:100px">
<button class="btn btn-primary" onclick="Photos.save()">保存</button>
</div>
<div class="photos-grid" id="photosGrid"><div class="empty-state">加载中...</div></div>
<div class="lightbox-overlay" id="lightbox" onclick="Photos.closeLightbox()">
<button class="lightbox-close">&times;</button><img id="lightboxImg" src=""><div class="lightbox-info" id="lightboxInfo"></div>
</div>
</section>
</main>
<div class="toast" id="toast"></div>
</div>

<script>
// ============ Storage ============
const LS = {
  get(k,d){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d}catch(e){return d}},
  set(k,v){localStorage.setItem(k,JSON.stringify(v))},
};

// ============ Initial Data ============
function initData(){
  if(!LS.get('laoli_family',null)) LS.set('laoli_family',{
    name:'老郦家',address:'北京顺义区誉天下123号楼3单元302',
    members:[
      {id:'liyun',name:'郦赟',role:'正家主',gender:'男',age:32,type:'human',color:'#E8913A',birthday:'07-04'},
      {id:'chensijing',name:'陈思婧',role:'副家主',gender:'女',age:31,type:'human',color:'#E874A5',birthday:'08-22'},
      {id:'lumi',name:'LUMI',role:'成员',gender:'母',age:7,type:'cat',color:'#7B9EBD',birthday:'07-20'},
      {id:'didi',name:'弟弟',role:'成员',gender:'公',age:6,type:'cat',color:'#8BA888',birthday:'08-23'}
    ]});
  if(!LS.get('laoli_schedules',null)) LS.set('laoli_schedules',{completed:[],custom:[]});
  if(!LS.get('laoli_rules',null)) LS.set('laoli_rules',[
    {id:'r1',title:'互相尊重原则',content:'家庭成员之间应相互尊重，不得使用侮辱性语言或人身攻击。即使有分歧，也要心平气和地沟通。'},
    {id:'r2',title:'家务分工公平',content:'家务活应按照各自时间和能力合理分配，不推诿、不抱怨。正家主负责统筹，副家主负责监督执行。'},
    {id:'r3',title:'财务管理透明',content:'家庭重大支出（超过1000元）需双方同意。日常消费各自独立，每月整理一次家庭账目。'},
    {id:'r4',title:'猫咪养护责任',content:'LUMI和弟弟是家庭成员，冻干每2天一次，水和猫粮每3天检查一次。谁下班早谁先喂。'},
    {id:'r5',title:'手机使用规范',content:'吃饭时不看手机；睡前一小时尽量不看；重要时刻（纪念日、家庭活动）手机静音。'},
    {id:'r6',title:'矛盾处理机制',content:'产生矛盾时，先冷静10分钟，再以"事实+感受+建议"的方式沟通。不翻旧账，不冷战过夜。'},
    {id:'r7',title:'健康第一',content:'双方互相督促体检、锻炼、规律作息。生病要及时就医，不许硬扛。'},
    {id:'r8',title:'定期家庭会议',content:'每月第一个周末召开家庭会议，回顾过去一个月，讨论待改进事项，规划下月安排。'}
  ]);
  if(!LS.get('laoli_messages',null)) LS.set('laoli_messages',[]);

// ============ Scheduler ============
function isWeekend(date){const d=date.getDay();return d===0||d===6;}
function dateStr(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function addDays(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r}
function todayStr(){const d=new Date();return dateStr(d)}
function todayDate(){const d=new Date();d.setHours(0,0,0,0);return d}

function getHolidays(year){
  // 2026 Chinese holidays (simplified)
  const h={
    '2026-01-01':1,'2026-01-02':1,'2026-01-03':1, // New Year
    '2026-02-16':1,'2026-02-17':1,'2026-02-18':1,'2026-02-19':1,'2026-02-20':1,'2026-02-21':1,'2026-02-22':1, // Spring Festival
    '2026-04-04':1,'2026-04-05':1,'2026-04-06':1, // Qingming
    '2026-05-01':1,'2026-05-02':1,'2026-05-03':1,'2026-05-04':1,'2026-05-05':1, // Labor Day
    '2026-06-01':1,'2026-06-02':1,'2026-06-03':1, // Dragon Boat
    '2026-09-24':1,'2026-09-25':1,'2026-09-26':1, // Mid-Autumn
    '2026-10-01':1,'2026-10-02':1,'2026-10-03':1,'2026-10-04':1,'2026-10-05':1,'2026-10-06':1,'2026-10-07':1,'2026-10-08':1, // National Day
  };
  const makeup={'2026-02-14':1,'2026-02-28':1,'2026-04-25':1,'2026-09-19':1};
  return {holidays:h,makeupDays:makeup};
}

function isHoliday(dateStr){return !!getHolidays(2026).holidays[dateStr]}

function adjustForHoliday(date,isReturn){
  // isReturn=true: return to BJ (Fri), isReturn=false: return to WX (Sun)
  // If holiday, shift to last working day before holiday for return to BJ,
  // and first working day after holiday for return to WX
  const d=new Date(date);
  const yr=d.getFullYear();
  const h=getHolidays(yr);
  const ds=dateStr(d);
  if(!h.holidays[ds]&&!h.makeupDays[ds]) return d; // not affected

  // Simple adjustment: find nearest non-holiday working day
  let cur=new Date(d);
  for(let i=0;i<14;i++){
    cur=addDays(cur,1);
    const s=dateStr(cur);
    if(!h.holidays[s]&&!isWeekend(cur)) return cur;
    if(h.makeupDays[s]) return cur;
  }
  return d;
}

function generateSchedules(){
  const stored=LS.get('laoli_schedules',{completed:[],custom:[]});
  const today=todayDate();
  const end=addDays(today,7);
  const holidays=getHolidays(2026);
  const schedules=[];
  const completionSet=new Set(stored.completed.map(c=>c.id));

  const lastFed=new Date(2026,5,20); // Jun 20
  const lastWater=new Date(2026,5,19); // Jun 19

  // Flights: every Fri BJ, every Sun WX
  let cur=new Date(today);
  cur.setDate(cur.getDate()-1); // start from yesterday to catch today
  while(cur<=end){
    const dow=cur.getDay();
    const ds=dateStr(cur);
    let isMakeup=holidays.makeupDays[ds];

    // Friday flight WX -> BJ
    if(dow===5||(isMakeup&&!isWeekend(cur)&&!isHoliday(ds))){
      // Check if holiday-adjusted
      schedules.push({id:'flight-to-bj-'+ds,title:'郦赟回京（无锡→北京）',date:ds,time:'morning',category:'travel',person:'郦赟',description:'每周五航班',auto:true});
      // Ticket reminder 30 days before
      const ticketDate=addDays(new Date(cur),-30);
      const ticketDS=dateStr(ticketDate);
      // Only add if within range
      const todayRef=todayDate();
      const ticketD=new Date(ticketDate);
      if(ticketD>=todayRef&&ticketD<=end){
        schedules.push({id:'ticket-bj-'+ds,title:'购票提醒：郦赟回京',date:ticketDS,time:'morning',category:'travel',person:'郦赟',description:'提前30天购票',auto:true});
      }
    }

    // Sunday flight BJ -> WX
    if(dow===0||(isMakeup&&!isWeekend(cur)&&!isHoliday(ds))){
      schedules.push({id:'flight-to-wx-'+ds,title:'郦赟返锡（北京→无锡）',date:ds,time:'evening',category:'travel',person:'郦赟',description:'每周日航班',auto:true});
    }

    // Daily kiss
    schedules.push({id:'kiss-'+ds,title:'睡前亲亲陈思婧',date:ds,time:'bedtime',category:'intimacy',person:'郦赟',description:'每日必修课',auto:true});

    cur=addDays(cur,1);
  }

  // Cat feeding (every 2 days from Jun 20)
  cur=new Date(lastFed);
  while(cur<=end){
    const ds=dateStr(cur);
    if(cur>=today){
      schedules.push({id:'feed-fdry-'+ds,title:'给 LUMI 和弟弟投喂冻干',date:ds,time:'evening',category:'pet',person:'',description:'每2天一次',auto:true});
    }
    cur=addDays(cur,2);
  }

  // Water check (every 3 days from Jun 19)
  cur=new Date(lastWater);
  while(cur<=end){
    const ds=dateStr(cur);
    if(cur>=today){
      schedules.push({id:'water-check-'+ds,title:'检查水和猫粮是否充足',date:ds,time:'evening',category:'pet',person:'',description:'每3天一次',auto:true});
    }
    cur=addDays(cur,3);
  }

  // Add completed status
  schedules.forEach(s=>{s.completed=completionSet.has(s.id);s.autoGenerated=s.auto;});

  // Add custom schedules
  const customSchedules=(stored.custom||[]).filter(s=>{
    const sd=new Date(s.date+'T00:00:00+08:00');
    return sd>=addDays(today,-1)&&sd<=end;
  });
  customSchedules.forEach(s=>{s.completed=completionSet.has(s.id);s.autoGenerated=false;});

  return [...schedules,...customSchedules];
}

function getCatStatus(){
  const today=todayDate();
  const lastFed=new Date(2026,5,20);
  const lastWater=new Date(2026,5,19);
  const daysSinceFed=Math.floor((today-lastFed)/(1000*60*60*24));
  const daysSinceWater=Math.floor((today-lastWater)/(1000*60*60*24));
  const nextFed=dateStr(addDays(lastFed,Math.ceil((daysSinceFed+1)/2)*2));
  const nextWater=dateStr(addDays(lastWater,Math.ceil((daysSinceWater+1)/3)*3));
  return {lastFedFreezeDry:'2026-06-20',daysSinceFed,nextFed,lastRefillWater:'2026-06-19',daysSinceWater,nextWaterCheck:nextWater};
}

function getAnniversaries(){
  const family=LS.get('laoli_family');
  const now=new Date();
  const yr=now.getFullYear();
  return family.members.filter(m=>m.birthday).map(m=>{
    const[bM,bD]=m.birthday.split('-').map(Number);
    let bDate=new Date(yr,bM-1,bD);
    if(bDate<now) bDate=new Date(yr+1,bM-1,bD);
    const daysUntil=Math.ceil((bDate-now)/(1000*60*60*24));
    const nextAge=bDate.getFullYear()===yr?m.age:m.age+1;
    return {memberId:m.id,name:m.name,birthday:m.birthday,
      date:dateStr(bDate),daysUntil,nextAge,emoji:m.type==='cat'?'🐱':(m.name==='郦赟'?'👨':'👩'),color:m.color};
  }).sort((a,b)=>a.daysUntil-b.daysUntil);
}

      const t=new Date(p.createdAt);
      return '<div class="photo-card"><img src="'+p.data+'" onclick="Photos.openLightbox(\''+p.data+'\',\''+(p.caption||'').replace(/'/g,'\\\'')+'\',\''+(t.getMonth()+1)+'月'+t.getDate()+'日\',\''+(tagLabels[p.tag]||'')+'\')" loading="lazy">'+
        '<div class="photo-card-footer"><span class="photo-tag">'+(tagLabels[p.tag]||'')+'</span><span class="photo-date">'+(t.getMonth()+1)+'月'+t.getDate()+'日</span>'+(p.caption?'<div class="photo-caption">'+p.caption+'</div>':'')+'</div>'+
        '<button class="photo-delete" onclick="event.stopPropagation();Photos.deletePhoto(\''+p.id+'\')">×</button></div>';
    }).join(''):'<div class="empty-state">还没有照片</div>';
  },
  openLightbox(src,caption,date,tag){
    document.getElementById('lightbox').classList.add('show');
    document.getElementById('lightboxImg').src=src;
    document.getElementById('lightboxInfo').textContent=(tag||'')+' · '+(date||'')+(caption?' · '+caption:'');
  },
  closeLightbox(){document.getElementById('lightbox').classList.remove('show')},
  deletePhoto(id){
    let photos=LS.get('laoli_photos');photos=photos.filter(p=>p.id!==id);LS.set('laoli_photos',photos);this.render();App.showToast('已删除');
  }
};

// ============ App Controller ============
const App={
  showToast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2000)},
  switchTab(tab){
    document.querySelectorAll('.nav-tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===tab));
    document.querySelectorAll('.tab-content').forEach(c=>c.classList.toggle('active',c.id==='tab-'+tab));
    try{
      if(tab==='dashboard')Dashboard.render();else if(tab==='schedule')Schedules.render();
      else if(tab==='rules')Rules.render();else if(tab==='messages')Messages.render();else if(tab==='photos')Photos.render();
    }catch(e){console.error(e)}
  },
  init(){
    document.querySelectorAll('.nav-tab').forEach(t=>t.addEventListener('click',()=>this.switchTab(t.dataset.tab)));
    document.querySelectorAll('.filter-chips .chip').forEach(c=>{c.addEventListener('click',()=>{document.querySelectorAll('.filter-chips .chip').forEach(x=>x.classList.remove('active'));c.classList.add('active');Schedules.filter=c.dataset.filter;Schedules.render()})});
    this.switchTab('dashboard');
  }
};

// ============ Init ============
initData();
document.addEventListener('DOMContentLoaded',()=>App.init());
</script>
